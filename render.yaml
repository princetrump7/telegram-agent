services:
  - type: web
    name: telegram-agent
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENCODE_API_KEY
        sync: false
      - key: OPENCODE_BASE_URL
        value: https://opencode.ai/zen/v1
      - key: AI_MODEL
        value: deepseek-v4-flash-free
      - key: RENDER_EXTERNAL_URL
        fromService:
          type: web
          name: telegram-agent
          property: host
      - key: LOG_LEVEL
        value: INFO
